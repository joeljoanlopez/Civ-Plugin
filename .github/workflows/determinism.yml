name: Cross-Platform Determinism

on:
  push:
  pull_request:

jobs:
  snapshot:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        working-directory: StrategyMapGenerationPlugin
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: StrategyMapGenerationPlugin
        run: cmake --build build --target DeterminismCheck --config Release

      - name: Generate snapshot
        working-directory: StrategyMapGenerationPlugin
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            exe=$(find build -name 'DeterminismCheck.exe' -type f | head -1)
          else
            exe=$(find build -name 'DeterminismCheck' -type f | head -1)
          fi
          "$exe" > snapshot.txt

      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.os }}
          path: StrategyMapGenerationPlugin/snapshot.txt

  compare:
    needs: snapshot
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: snapshot-*
          merge-multiple: false

      - name: Compare Linux and macOS
        run: |
          echo "=== Linux vs macOS ==="
          diff snapshot-ubuntu-latest/snapshot.txt snapshot-macos-latest/snapshot.txt
          echo "Linux and macOS produce same output"

      - name: Compare Linux and Windows
        run: |
          echo "=== Linux vs Windows ==="
          diff snapshot-ubuntu-latest/snapshot.txt snapshot-windows-latest/snapshot.txt
          echo "Linux and Windows produce same output"
